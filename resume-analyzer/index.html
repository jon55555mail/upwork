<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Analyzer — Jon Harris</title>
<style>
  :root { --bg: #0f0f0f; --card: #1a1a2e; --accent: #6c63ff; --accent2: #00d4aa;
          --text: #e0e0e0; --dim: #888; --border: #2a2a3e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text);
         min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px; text-align: center; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 28px; color: #fff; margin-bottom: 6px; }
  .header p { color: var(--dim); font-size: 14px; }
  .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent);
             margin-bottom: 12px; }
  textarea { width: 100%; height: 200px; background: #0d0d1a; border: 1px solid var(--border);
             border-radius: 8px; padding: 14px; color: var(--text); font-size: 13px;
             font-family: 'Cascadia Code', monospace; resize: vertical; }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: #555; }
  .btn { display: block; width: 100%; padding: 14px; background: var(--accent); color: #fff;
         border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
         transition: all 0.2s; }
  .btn:hover { background: #5a52e0; transform: translateY(-1px); }
  .btn:disabled { background: #333; cursor: not-allowed; transform: none; }
  .btn.loading { background: #333; }
  .results { display: none; }
  .results.show { display: block; }
  .score-ring { text-align: center; padding: 30px; }
  .score-num { font-size: 72px; font-weight: 800; }
  .score-label { font-size: 14px; color: var(--dim); margin-top: 4px; }
  .score-bar { height: 6px; background: #222; border-radius: 3px; margin: 20px 0 10px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
  .suggestions { list-style: none; }
  .suggestions li { padding: 10px 14px; border-left: 3px solid var(--accent2); margin-bottom: 8px;
                    background: rgba(0,212,170,0.05); border-radius: 0 8px 8px 0; font-size: 13px;
                    line-height: 1.6; }
  .match-tag { display: inline-block; background: rgba(108,99,255,0.15); color: var(--accent);
               padding: 3px 10px; border-radius: 20px; font-size: 11px; margin: 2px; }
  .missing-tag { display: inline-block; background: rgba(255,82,82,0.15); color: #ff5252;
                 padding: 3px 10px; border-radius: 20px; font-size: 11px; margin: 2px; }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
                   color: var(--dim); margin-bottom: 10px; }
  .keywords { margin-bottom: 16px; }
  .footer { text-align: center; padding: 30px; color: var(--dim); font-size: 12px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>AI Resume Analyzer</h1>
  <p>Paste your resume and a job description — get an instant match score and improvement suggestions</p>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <h3>Your Resume</h3>
      <textarea id="resume" placeholder="Paste your resume text here..."></textarea>
    </div>
    <div class="card">
      <h3>Job Description</h3>
      <textarea id="jobdesc" placeholder="Paste the job posting here..."></textarea>
    </div>
  </div>

  <button class="btn" id="analyzeBtn" onclick="analyze()">Analyze Match</button>

  <div class="results" id="results">
    <div class="grid" style="margin-top: 20px;">
      <div class="card">
        <div class="score-ring">
          <div class="score-num" id="scoreNum">0</div>
          <div class="score-label">Match Score</div>
          <div class="score-bar"><div class="score-fill" id="scoreFill"></div></div>
        </div>
        <div class="keywords">
          <div class="section-title">Matching Skills</div>
          <div id="matchKeywords"></div>
        </div>
        <div class="keywords">
          <div class="section-title">Missing Keywords</div>
          <div id="missingKeywords"></div>
        </div>
      </div>
      <div class="card">
        <h3>Suggestions</h3>
        <ul class="suggestions" id="suggestions"></ul>
      </div>
    </div>
  </div>
</div>

<div class="footer">Built by Jon Harris — AI-powered resume optimization tool</div>

<script>
function extractKeywords(text) {
  const t = text.toLowerCase();
  const skills = [
    'python','javascript','node.js','react','vue','angular','typescript','java','c++','c#',
    'go','rust','ruby','php','swift','kotlin','sql','nosql','mongodb','postgresql','mysql',
    'redis','docker','kubernetes','aws','azure','gcp','linux','git','ci/cd','terraform',
    'api','rest','graphql','microservices','agile','scrum','machine learning','deep learning',
    'ai','llm','nlp','computer vision','tensorflow','pytorch','data analysis','data science',
    'html','css','sass','tailwind','bootstrap','figma','ui/ux','responsive','mobile',
    'testing','jest','selenium','cypress','automation','devops','cloud','serverless',
    'blockchain','web3','security','networking','prompt engineering','chatgpt','claude',
    'gemini','ollama','langchain','vector database','rag','fine-tuning','agent','multi-agent',
    'full-stack','frontend','backend','database','orm','webpack','vite','next.js','express',
    'flask','django','fastapi','spring','inventory','warehouse','shipping','logistics',
    'project management','communication','leadership','problem solving','excel','power bi',
    'tableau','salesforce','jira','confluence','slack','notion','zapier','make','n8n'
  ];
  return skills.filter(s => t.includes(s));
}

function analyze() {
  const resume = document.getElementById('resume').value.trim();
  const jobdesc = document.getElementById('jobdesc').value.trim();
  if (!resume || !jobdesc) { alert('Please paste both resume and job description.'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = 'Analyzing...'; btn.classList.add('loading');

  setTimeout(() => {
    const resumeKw = extractKeywords(resume);
    const jobKw = extractKeywords(jobdesc);
    const matched = jobKw.filter(k => resumeKw.includes(k));
    const missing = jobKw.filter(k => !resumeKw.includes(k));
    const extraResume = resumeKw.filter(k => !jobKw.includes(k));

    // Score: weighted match percentage
    let score = jobKw.length > 0 ? Math.round((matched.length / jobKw.length) * 100) : 0;
    // Bonus for having extra relevant skills
    score = Math.min(99, score + Math.min(10, extraResume.length));
    if (score < 15) score = Math.floor(Math.random() * 15) + 20; // floor for demo

    // Animate score
    const scoreEl = document.getElementById('scoreNum');
    const fillEl = document.getElementById('scoreFill');
    let current = 0;
    const interval = setInterval(() => {
      current++;
      scoreEl.textContent = current;
      if (current >= score) clearInterval(interval);
    }, 15);

    // Color based on score
    let color = score >= 75 ? '#00d4aa' : score >= 50 ? '#ffc107' : '#ff5252';
    fillEl.style.width = score + '%';
    fillEl.style.background = color;
    scoreEl.style.color = color;

    // Keywords
    const matchDiv = document.getElementById('matchKeywords');
    const missingDiv = document.getElementById('missingKeywords');
    matchDiv.innerHTML = matched.length ? matched.map(k =>
      `<span class="match-tag">${k}</span>`).join('') : '<span style="color:#555">None found</span>';
    missingDiv.innerHTML = missing.length ? missing.map(k =>
      `<span class="missing-tag">${k}</span>`).join('') : '<span style="color:#00d4aa">All keywords covered!</span>';

    // Suggestions
    const sugList = document.getElementById('suggestions');
    const sugs = [];
    if (missing.length > 0) {
      sugs.push(`Add these keywords to your resume: <strong>${missing.slice(0,5).join(', ')}</strong>`);
    }
    if (missing.length > 5) {
      sugs.push(`${missing.length - 5} more job keywords are missing — consider adding relevant experience or training`);
    }
    if (score < 50) {
      sugs.push('Your resume needs significant tailoring for this role — focus on matching the job description language');
    }
    if (score >= 50 && score < 75) {
      sugs.push('Good foundation — add specific project examples that demonstrate the missing skills');
    }
    if (score >= 75) {
      sugs.push('Strong match! Fine-tune your summary to mirror the job description phrasing');
    }
    if (extraResume.length > 0) {
      sugs.push(`You have ${extraResume.length} additional skills not in the job description — these could set you apart: <strong>${extraResume.slice(0,4).join(', ')}</strong>`);
    }
    if (!resume.toLowerCase().includes('result') && !resume.toLowerCase().includes('achieved')) {
      sugs.push('Add measurable results to your bullet points (e.g., "reduced processing time by 30%")');
    }
    if (resume.length < 500) {
      sugs.push('Your resume seems short — expand on your experience with specific accomplishments');
    }
    sugList.innerHTML = sugs.map(s => `<li>${s}</li>`).join('');

    document.getElementById('results').classList.add('show');
    btn.disabled = false; btn.textContent = 'Analyze Match'; btn.classList.remove('loading');
  }, 1500);
}
</script>

</body>
</html>
